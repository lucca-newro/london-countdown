<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fondo azul marino -->
  <rect width="192" height="192" fill="#001C3D"/>
  
  <!-- Casa: estructura principal -->
  <g transform="translate(96, 96)">
    <!-- Techo (triángulo rojo) -->
    <path d="M -50 0 L 0 -45 L 50 0 Z" fill="url(#grad)" stroke="#E8E1D3" stroke-width="2"/>
    
    <!-- Paredes (rectángulo claro) -->
    <rect x="-45" y="0" width="90" height="55" fill="#E8E1D3" stroke="#E8E1D3" stroke-width="2"/>
    
    <!-- Puerta (rectángulo rojo) -->
    <rect x="-15" y="25" width="30" height="35" fill="#DC2626"/>
    
    <!-- Picaporte (círculo claro) -->
    <circle cx="10" cy="42" r="3" fill="#E8E1D3"/>
    
    <!-- Ventana izquierda -->
    <rect x="-35" y="10" width="18" height="18" fill="#001C3D" stroke="#DC2626" stroke-width="2"/>
    <line x1="-26" y1="10" x2="-26" y2="28" stroke="#DC2626" stroke-width="1"/>
    <line x1="-35" y1="19" x2="-17" y2="19" stroke="#DC2626" stroke-width="1"/>
    
    <!-- Ventana derecha -->
    <rect x="17" y="10" width="18" height="18" fill="#001C3D" stroke="#DC2626" stroke-width="2"/>
    <line x1="26" y1="10" x2="26" y2="28" stroke="#DC2626" stroke-width="1"/>
    <line x1="17" y1="19" x2="35" y2="19" stroke="#DC2626" stroke-width="1"/>
  </g>
</svg>
